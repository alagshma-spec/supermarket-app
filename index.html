<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام السوبرماركت</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- ============ شاشة تسجيل الدخول ============ -->
  <main id="loginView" class="center-screen">
    <form id="loginForm" class="card login-card">
      <div class="logo">🏪</div>
      <h1>نظام السوبرماركت</h1>
      <p class="subtitle">سجّل دخولك للمتابعة</p>

      <div id="loginError" class="alert-error" hidden></div>

      <label class="field">
        <span>اسم المستخدم</span>
        <input type="text" id="username" autocomplete="username" required />
      </label>

      <label class="field">
        <span>كلمة المرور</span>
        <input type="password" id="password" autocomplete="current-password" required />
      </label>

      <button type="submit" class="btn-primary">دخول</button>

      <p class="hint">أول تشغيل؟ استخدم: <b>admin</b> / <b>admin123</b> ثم غيّرها لاحقًا</p>
    </form>
  </main>

  <!-- ============ هيكل التطبيق بعد الدخول ============ -->
  <div id="appShell" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="logo small">🏪</span>
        <span>السوبرماركت</span>
      </div>
      <nav id="navList" class="nav-list"></nav>
      <button id="logoutBtn" class="btn-logout">تسجيل الخروج</button>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div id="topbarTitle">لوحة التحكم</div>
        <div id="userBadge" class="user-badge"></div>
      </header>
      <section id="content" class="content"></section>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
